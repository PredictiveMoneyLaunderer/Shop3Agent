<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Shop3 logo</title>
  <desc id="desc">Stylized shopping bag with the number 3 and wordmark Shop3</desc>

  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="300" r="220" fill="url(#g1)" filter="url(#shadow)" />

  <!-- Shopping bag body -->
  <rect x="312" y="380" width="400" height="360" rx="40" ry="40" fill="#0A0A0A" opacity="0.95" />

  <!-- Bag handle -->
  <path d="M392 380 C392 300 632 300 632 380" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.95" />

  <!-- Stylized '3' badge -->
  <g transform="translate(540,530)">
    <circle cx="0" cy="0" r="70" fill="#FFD166"/>
    <text x="0" y="22" font-family="Segoe UI, Roboto, Arial" font-size="96" font-weight="700" fill="#0A0A0A" text-anchor="middle">3</text>
  </g>

  <!-- Wordmark -->
  <text x="512" y="820" font-family="Segoe UI, Roboto, Arial" font-size="96" font-weight="700" fill="#111827" text-anchor="middle">Shop3</text>

  <!-- Accent: small cart icon inside bag (simple) -->
  <g transform="translate(420,470) scale(0.9)" fill="#FFFFFF" opacity="0.95">
    <rect x="0" y="0" width="200" height="110" rx="8"/>
    <circle cx="40" cy="130" r="16" />
    <circle cx="160" cy="130" r="16" />
    <path d="M20 20 L60 20 L80 80 L180 80" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

</svg>
