<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-labelledby="title desc">
  <title id="title">Agent Payments logo</title>
  <desc id="desc">Logo combining a shopping bag, gear, chain link and token to represent Agent Payments and DeFi.</desc>

  <defs>
    <linearGradient id="gradA" x1="0" x2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0" x2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Soft background circle -->
  <g filter="url(#softShadow)">
    <circle cx="600" cy="300" r="200" fill="url(#gradA)" />
  </g>

  <!-- Shopping bag (stylized) -->
  <g transform="translate(200,360)">
    <rect x="0" y="0" width="640" height="480" rx="40" ry="40" fill="#0F172A" opacity="0.98"/>
    <!-- handle -->
    <path d="M160 0 C160 -80 480 -80 480 0" transform="translate(0,-36)" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>

  <!-- Gear element (top-right overlapping circle) symbolizing payments/infrastructure -->
  <g transform="translate(780,420) scale(0.7)">
    <circle cx="0" cy="0" r="110" fill="url(#gradB)"/>
    <g fill="#0B1220">
      <path d="M-8 -80 L8 -80 L18 -60 L38 -52 L42 -34 L60 -26 L60 -8 L42 0 L38 18 L18 26 L8 46 L-8 46 L-18 26 L-38 18 L-42 0 L-60 -8 L-60 -26 L-42 -34 L-38 -52 L-18 -60 Z" transform="translate(0,0) scale(0.9)"/>
      <circle cx="0" cy="0" r="36" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- Chain link / DeFi symbolism inside bag area -->
  <g transform="translate(360,520) scale(0.9)">
    <path d="M40 0 a40 40 0 1 1 -80 0" stroke="#00D4FF" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M-40 0 a40 40 0 1 1 80 0" stroke="#FFD166" stroke-width="20" fill="none" stroke-linecap="round" transform="translate(120,0)"/>
    <rect x="40" y="-24" width="80" height="48" rx="12" ry="12" fill="#FFFFFF" opacity="0.95" transform="translate(20,0)"/>
  </g>

  <!-- Token / badge with 'AP' monogram -->
  <g transform="translate(580,620)">
    <circle cx="0" cy="0" r="86" fill="#0EA5A4"/>
    <text x="0" y="28" font-family="Segoe UI, Roboto, Arial" font-size="84" font-weight="800" text-anchor="middle" fill="#07122B">AP</text>
  </g>

  <!-- Wordmark: Agent Payments -->
  <text x="600" y="980" font-family="Segoe UI, Roboto, Arial" font-size="76" font-weight="800" text-anchor="middle" fill="#0B1220">Agent Payments</text>

  <!-- Small accent cart icon inside bag for commerce hint -->
  <g transform="translate(420,520) scale(0.65)" fill="#FFFFFF" opacity="0.95">
    <rect x="0" y="0" width="220" height="120" rx="10"/>
    <circle cx="48" cy="150" r="18" />
    <circle cx="172" cy="150" r="18" />
    <path d="M24 30 L64 30 L92 98 L200 98" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>

</svg>
